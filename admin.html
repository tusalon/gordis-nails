<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Gordis Nails</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    
    <!-- FullCalendar CSS y JS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    
    <style>
        /* Estilos personalizados para el calendario */
        :root {
            --fc-today-bg-color: rgba(236, 72, 153, 0.1);
            --fc-event-border-color: #ec4899;
            --fc-event-bg-color: #ec4899;
        }
        
        .fc .fc-button-primary {
            background-color: #ec4899 !important;
            border-color: #db2777 !important;
        }
        
        .fc .fc-button-primary:hover {
            background-color: #db2777 !important;
        }
        
        .fc .fc-button-primary:disabled {
            background-color: #f9a8d4 !important;
        }
        
        .fc .fc-day-today {
            background-color: var(--fc-today-bg-color) !important;
        }
        
        .fc-event {
            cursor: pointer !important;
        }
        
        /* Asegurar que el calendario tenga altura y sea visible */
        .fc {
            min-height: 500px !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .fc-view-harness {
            min-height: 400px !important;
        }
        
        .fc .fc-view {
            min-height: 400px !important;
        }
        
        /* Estilo para días cerrados en el calendario */
        .dia-cerrado {
            background-color: #fee2e2 !important;
            opacity: 0.6;
            cursor: not-allowed !important;
        }
        
        .dia-cerrado .fc-daygrid-day-number {
            text-decoration: line-through;
            color: #dc2626 !important;
        }
        
        .dia-cerrado .fc-daygrid-day-top {
            opacity: 0.5;
        }
        
        .dia-cerrado .fc-daygrid-day-frame {
            background-color: #fef2f2;
        }
        
        /* Estilo para días no laborables (profesional no trabaja) */
        .dia-no-laborable {
            background-color: #f3f4f6 !important;
            opacity: 0.5;
            cursor: not-allowed !important;
        }
        
        .dia-no-laborable .fc-daygrid-day-number {
            color: #9ca3af !important;
        }
        
        /* Animación */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Mejoras responsive para el calendario */
        @media (max-width: 768px) {
            .fc {
                min-height: 400px !important;
            }
            .fc-view-harness {
                min-height: 300px !important;
            }
            .fc .fc-toolbar {
                flex-direction: column;
                gap: 10px;
            }
            .fc .fc-toolbar-title {
                font-size: 1rem !important;
            }
            .fc .fc-button {
                padding: 0.2rem 0.4rem !important;
                font-size: 0.7rem !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <!-- Scripts - ORDEN CORRECTO -->
    <script src="utils/supabase-config.js"></script>
    <script src="utils/config-negocio.js"></script>
    <script src="utils/storage.js"></script>
    <script src="utils/api.js"></script>
    <script src="utils/timeLogic.js"></script>
    <script src="utils/auth-clients.js"></script>
    <script src="utils/auth-profesionales.js"></script>
    <script src="utils/servicios.js"></script>
    <script src="utils/profesionales.js"></script>
    <script src="utils/config.js"></script>
    <script src="utils/whatsapp-helper.js"></script>

    <!-- Componentes admin -->
   <script src="components/admin/ConfigPanel.js" type="text/babel"></script> 
    <script src="components/admin/ServiciosPanel.js" type="text/babel"></script>
    <script src="components/admin/ProfesionalesPanel.js" type="text/babel"></script>
    <script src="components/admin/HorariosPorDiaPanel.js" type="text/babel"></script>
    <script src="admin-app.js" type="text/babel"></script>

    <script>
        (function() {
            const negocioId = localStorage.getItem('negocioId');
            
            if (!negocioId) {
                console.log('🚫 No hay sesión, redirigiendo a login');
                window.location.href = 'admin-login.html';
                return;
            }
            
            // Verificar sesión (8 horas)
            const loginTime = localStorage.getItem('adminLoginTime');
            const isValidSession = loginTime && (Date.now() - parseInt(loginTime)) < 8 * 60 * 60 * 1000;
            
            if (!isValidSession) {
                localStorage.clear();
                window.location.href = 'admin-login.html';
            }
        })();
    </script>
</body>
</html>
